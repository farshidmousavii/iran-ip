name: Update Iran IP Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go run ./cmd/ -fetch-only

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore(data): update iran ip ranges [skip ci]"
          git push

      - name: Create release archive
        run: |
          cd dist && zip -r ../iran-ip-ranges.zip .

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create or update daily release
        uses: ncipollo/release-action@v1
        with:
          tag: daily-${{ steps.date.outputs.date }}
          name: Daily Update ${{ steps.date.outputs.date }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

          artifacts: |
            iran-ip-ranges.zip
            dist/checksums.txt

          body: |
            ## Iran IP Lists — Daily Update

            Automatically updated Iran IPv4/IPv6 ranges.

            ### Downloads

            - [`iran-ip-ranges.zip`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/iran-ip-ranges.zip) — all files in one archive
            - [`checksums.txt`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/checksums.txt) — SHA256 checksums

            Individual files are also available from the `dist/` folder on GitHub:
            https://github.com/farshidmousavii/iran-ip-ranges/tree/main/dist
