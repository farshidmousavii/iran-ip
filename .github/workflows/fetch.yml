name: Update Iran IP Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go run ./cmd/ -fetch-only

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore(data): update iran ip ranges [skip ci]"
          git push

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create or update daily release
        uses: ncipollo/release-action@v1
        with:
          tag: daily-${{ steps.date.outputs.date }}
          name: Daily Update ${{ steps.date.outputs.date }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

          artifacts: |
            dist/raw/*
            dist/routeros/*
            dist/sing-box/*
            dist/clash/*
            dist/xray/*
            dist/firewall/*
            dist/openwrt/*
            dist/checksums.txt

          body: |
            ## Iran IP Lists — Daily Update

            Automatically updated Iran IPv4/IPv6 ranges.

            ### Included outputs

            #### Raw
            - IPv4 CIDRs
            - IPv6 CIDRs
            - JSON
            - YAML

            #### Router Platforms
            - MikroTik RouterOS
            - OpenWRT

            #### Proxy Ecosystem
            - Sing-box
            - Clash / Mihomo
            - Xray

            #### Firewall Ecosystem
            - NFTables
            - IPSet

            #### Integrity
            - SHA256 checksums
